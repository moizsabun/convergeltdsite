<app-page-header
  eyebrow="Careers"
  title="Build your career with Converge"
  subtitle="Join a team that values craft, curiosity and collaboration. We're always looking for people who love solving hard problems."
/>

<section class="bg-white py-20 md:py-24">
  <div class="container-x">
    <h2 class="font-display text-3xl font-extrabold text-navy">Why work with us</h2>
    <div class="mt-10 grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
      @for (p of perks; track p) {
        <div class="flex items-center gap-3 rounded-xl border border-line bg-surface px-5 py-4">
          <span class="grid place-items-center w-8 h-8 rounded-lg bg-brand/10 text-brand">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
          </span>
          <span class="font-medium text-navy">{{ p }}</span>
        </div>
      }
    </div>
  </div>
</section>

<section class="bg-surface py-20 md:py-24">
  <div class="container-x">
    <h2 class="font-display text-3xl font-extrabold text-navy">Open positions</h2>
    <div class="mt-10 space-y-4">
      @for (job of jobs; track job.title) {
        <div class="flex flex-col gap-4 rounded-2xl border border-line bg-white p-6 sm:flex-row sm:items-center sm:justify-between">
          <div>
            <h3 class="text-lg font-bold text-navy">{{ job.title }}</h3>
            <p class="mt-1 text-sm text-muted">{{ job.type }} · {{ job.location }}</p>
            <div class="mt-3 flex flex-wrap gap-2">
              @for (t of job.tags; track t) {
                <span class="rounded-full bg-brand/10 px-3 py-1 text-xs font-medium text-brand">{{ t }}</span>
              }
            </div>
          </div>
          <a routerLink="/contact" class="inline-flex items-center justify-center rounded-full bg-brand px-6 py-2.5 text-sm font-semibold text-white transition hover:bg-brand-dark">Apply now</a>
        </div>
      }
    </div>

    <p class="mt-10 text-muted">
      Don't see a role that fits?
      <a routerLink="/contact" class="font-semibold text-brand">Send us your CV</a>
      — we'd love to hear from you.
    </p>
  </div>
</section>
