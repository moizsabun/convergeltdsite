<app-page-header
  eyebrow="Services"
  title="Everything you need to build and grow"
  subtitle="End-to-end technology services, delivered by one accountable team — from product engineering to communications and support."
/>

<section class="bg-white py-20 md:py-28">
  <div class="container-x grid gap-8 md:grid-cols-2">
    @for (s of services; track s.id) {
      <article class="rounded-2xl border border-line bg-white p-8 transition hover:border-brand/40 hover:shadow-xl hover:shadow-slate-200/60">
        <div class="grid place-items-center w-14 h-14 rounded-xl bg-brand/10 text-brand">
          <app-icon [name]="s.icon" />
        </div>
        <h2 class="mt-5 text-xl font-bold text-navy">{{ s.title }}</h2>
        <p class="mt-2 text-muted">{{ s.summary }}</p>
        <ul class="mt-5 space-y-2">
          @for (f of s.features; track f) {
            <li class="flex items-center gap-2 text-sm text-ink">
              <span class="grid place-items-center w-5 h-5 rounded-full bg-accent/15 text-accent">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
              </span>
              {{ f }}
            </li>
          }
        </ul>
      </article>
    }
  </div>

  <div class="container-x mt-16 text-center">
    <a routerLink="/contact" class="inline-flex items-center gap-2 rounded-full bg-brand px-8 py-3.5 font-semibold text-white shadow-lg shadow-brand/30 transition hover:bg-brand-dark">
      Request a quote
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </a>
  </div>
</section>
