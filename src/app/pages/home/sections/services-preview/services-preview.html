<section class="bg-white py-20 md:py-28">
  <div class="container-x">
    <div class="max-w-2xl">
      <span class="text-sm font-semibold uppercase tracking-wider text-brand">What we do</span>
      <h2 class="mt-3 font-display text-3xl md:text-4xl font-extrabold text-navy">
        Solutions that move your business forward
      </h2>
      <p class="mt-4 text-muted">
        From the first line of code to round-the-clock support, we deliver
        end-to-end technology services tailored to your goals.
      </p>
    </div>

    <div class="mt-12 grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
      @for (s of services; track s.id) {
        <article
          class="group relative rounded-2xl border border-line bg-white p-7 transition hover:-translate-y-1 hover:border-brand/40 hover:shadow-xl hover:shadow-slate-200/60"
        >
          <div class="grid place-items-center w-14 h-14 rounded-xl bg-brand/10 text-brand transition group-hover:bg-brand group-hover:text-white">
            <app-icon [name]="s.icon" />
          </div>
          <h3 class="mt-5 text-lg font-bold text-navy">{{ s.title }}</h3>
          <p class="mt-2 text-sm leading-relaxed text-muted">{{ s.summary }}</p>
          <a routerLink="/services" class="mt-5 inline-flex items-center gap-1 text-sm font-semibold text-brand">
            Learn more
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="transition group-hover:translate-x-1"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
          </a>
        </article>
      }
    </div>
  </div>
</section>
