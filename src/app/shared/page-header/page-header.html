<section class="relative overflow-hidden bg-navy pt-32 pb-16 md:pt-40 md:pb-20">
  <div class="absolute -top-24 -right-24 w-[32rem] h-[32rem] rounded-full bg-brand/20 blur-3xl"></div>
  <div class="absolute -bottom-32 -left-24 w-[28rem] h-[28rem] rounded-full bg-accent/20 blur-3xl"></div>
  <div class="container-x relative">
    @if (eyebrow()) {
      <span class="text-sm font-semibold uppercase tracking-wider text-brand-light">{{ eyebrow() }}</span>
    }
    <h1 class="mt-3 font-display text-4xl md:text-5xl font-extrabold text-white">{{ title() }}</h1>
    @if (subtitle()) {
      <p class="mt-4 max-w-2xl text-lg text-slate-300">{{ subtitle() }}</p>
    }
  </div>
</section>
